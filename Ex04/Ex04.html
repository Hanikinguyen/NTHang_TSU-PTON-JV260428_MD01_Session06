<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <link rel="stylesheet" href="./Ex04.css">
</head>
<body>

    <header class="blog-header">
        <h1>My Blog</h1>
        <nav class="nav-links">
            <a href="#">Home</a>
            <a href="#">Categories</a>
            <a href="#">About</a>
        </nav>
    </header>

    <main class="main-container">
        
        <aside class="sidebar">
            <h3>Chuyên mục</h3>
            <ul>
                <li><a href="#">CSS</a></li>
                <li><a href="#">JavaScript</a></li>
                <li><a href="#">HTML</a></li>
            </ul>
        </aside>

        <section class="content-area">
            
            <article class="post">
                <h2>Bài viết 1</h2>
                <div class="post-image-placeholder img-yellow">
                    <span class="js-text">JS</span>
                </div>
                <p class="post-excerpt">Đây là nội dung tóm tắt của bài viết 1.</p>
            </article>

            <article class="post">
                <h2>Bài viết 2</h2>
                <div class="post-image-placeholder img-dark">
                    <span class="js-badge">JS</span>
                </div>
                <p class="post-excerpt">Đây là nội dung tóm tắt của bài viết 2.</p>
            </article>

        </section>

    </main>

    <footer class="blog-footer">
        Liên hệ: email@example.com
    </footer>

</body>
</html>
